app-id: org.libsdl.Maelstrom
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: Maelstrom
finish-args:
  - --device=dri
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
modules:
  - name: Maelstrom
    buildsystem: cmake-ninja
    config-opts:
      - -DSTEAM=OFF
      - -DSTANDALONE_INSTALL=FALSE
      - -DCMAKE_INSTALL_BINDIR=${FLATPAK_DEST}/bin/
      - -DCMAKE_INSTALL_LIBDIR=${FLATPAK_DEST}/lib/
      - -DCMAKE_INSTALL_DOCDIR=${FLATPAK_DEST}/share/docs/Maelstrom/
      - -DGAME_INSTALL_DATADIR=${FLATPAK_DEST}/share/Maelstrom/
      # Require SDL 3.4.2, therefore disabled
      # - -DUSE_VENDORED_SDL=false
    post-install:
      - install -Dm644 org.libsdl.Maelstrom.png -t ${FLATPAK_DEST}/share/icons/hicolor/512x512/apps/
      - install -Dm644 org.libsdl.Maelstrom.desktop -t ${FLATPAK_DEST}/share/applications/
      - install -Dm644 org.libsdl.Maelstrom.appdata.xml -t ${FLATPAK_DEST}/share/metainfo/
    cleanup:
      - /share/docs
      - /share/Maelstrom/Data/Steam
    sources:
      - type: archive
        url: https://github.com/libsdl-org/Maelstrom/releases/download/release-4.0.1/Maelstrom-4.0.1.tar.gz
        sha256: d75adce9a0a5fc99309a7e4230d23815c2d79d54dbb4bdb0c5c04b1abf47c96a
        x-checker-data:
          type: anitya
          project-id: 9974
          stable-only: true
          url-template: https://github.com/libsdl-org/Maelstrom/releases/download/release-$version/Maelstrom-$version.tar.gz
      - type: file
        path: org.libsdl.Maelstrom.desktop
      - type: file
        path: org.libsdl.Maelstrom.png
      - type: file
        path: org.libsdl.Maelstrom.appdata.xml
